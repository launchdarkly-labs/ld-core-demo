components:
  schemas:
    CreateDatasetRequest:
      properties:
        name:
          type: string
          maxLength: 128
          minLength: 1
          title: Name
        filename:
          anyOf:
          - type: string
            maxLength: 256
            minLength: 1
          - type: 'null'
          title: Filename
        description:
          anyOf:
          - type: string
            maxLength: 512
          - type: 'null'
          title: Description
        format:
          type: string
          title: Format
        source_uri:
          anyOf:
          - type: string
            minLength: 1
            format: uri
          - type: 'null'
          title: Source Uri
        size_bytes:
          anyOf:
          - type: integer
          - type: 'null'
          title: Size Bytes
      type: object
      required:
      - name
      - format
      title: CreateDatasetRequest
    CriterionResultMeta:
      properties:
        usage:
          anyOf:
          - $ref: '#/components/schemas/CriterionResultUsage'
          - type: 'null'
      type: object
      title: CriterionResultMeta
      description: Metadata for a criterion evaluation result.
    CriterionResultUsage:
      properties:
        inputTokens:
          anyOf:
          - type: integer
          - type: 'null'
          title: Inputtokens
        outputTokens:
          anyOf:
          - type: integer
          - type: 'null'
          title: Outputtokens
        totalTokens:
          anyOf:
          - type: integer
          - type: 'null'
          title: Totaltokens
        latencyMs:
          anyOf:
          - type: integer
          - type: 'null'
          title: Latencyms
      type: object
      title: CriterionResultUsage
      description: Token usage details for a criterion evaluation.
    CriterionSummary:
      properties:
        criterionType:
          type: string
          title: Criteriontype
        criterionThreshold:
          anyOf:
          - type: number
          - type: 'null'
          title: Criterionthreshold
        criterionPassRateThreshold:
          anyOf:
          - type: number
          - type: 'null'
          title: Criterionpassratethreshold
        verdictCounts:
          $ref: '#/components/schemas/VerdictCounts'
        score:
          $ref: '#/components/schemas/FloatStats'
        latencyMs:
          $ref: '#/components/schemas/IntStats'
        tokens:
          $ref: '#/components/schemas/TokenStats'
      type: object
      required:
      - criterionType
      - verdictCounts
      title: CriterionSummary
    DatasetFileDownloadResponse:
      properties:
        url:
          type: string
          title: Url
        expiresAt:
          type: string
          format: date-time
          title: Expiresat
        filename:
          type: string
          title: Filename
        contentType:
          type: string
          title: Contenttype
      type: object
      required:
      - url
      - expiresAt
      - filename
      - contentType
      title: DatasetFileDownloadResponse
    DatasetListItem:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        name:
          type: string
          title: Name
        filename:
          type: string
          title: Filename
        contentType:
          anyOf:
          - type: string
          - type: 'null'
          title: Contenttype
        blobUri:
          anyOf:
          - type: string
          - type: 'null'
          title: Bloburi
        datasetHash:
          anyOf:
          - type: string
          - type: 'null'
          title: Datasethash
        rowCount:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rowcount
        status:
          type: string
          enum:
          - pending
          - ready
          - failed
          title: Status
          default: pending
        createdBy:
          type: string
          title: Createdby
        createdAt:
          type: string
          format: date-time
          title: Createdat
        updatedAt:
          type: string
          format: date-time
          title: Updatedat
        sizeBytes:
          anyOf:
          - type: integer
          - type: 'null'
          title: Sizebytes
      type: object
      required:
      - id
      - name
      - filename
      - createdBy
      - createdAt
      - updatedAt
      title: DatasetListItem
    DatasetListResponse:
      properties:
        datasets:
          items:
            $ref: '#/components/schemas/DatasetListItem'
          type: array
          title: Datasets
        totalCount:
          type: integer
          title: Totalcount
        page:
          type: integer
          title: Page
        pageSize:
          type: integer
          title: Pagesize
      type: object
      required:
      - totalCount
      - page
      - pageSize
      title: DatasetListResponse
    DatasetMetadataLite:
