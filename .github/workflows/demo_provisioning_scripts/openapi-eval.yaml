openapi: 3.1.0
info:
  title: AI Evaluator API
  version: 0.1.0
paths:
  /projects/{projKey}/datasets:
    post:
      tags:
      - datasets
      summary: Create Dataset
      operationId: createDataset
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Internal Server Error
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - datasets
      summary: List Datasets
      operationId: listDatasets
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Page Size
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: filter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Filter
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Internal Server Error
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects/{projKey}/datasets/{dataset_id}:
    get:
      tags:
      - datasets
      summary: Get Dataset
      operationId: getDataset
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMetadataResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Internal Server Error
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - datasets
      summary: Update a dataset
      description: Update a dataset's name and/or description. Both fields are optional;
        at least one must be provided.
      operationId: patchDataset
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchDatasetRequest'
      responses:
        '204':
          description: Successful Response
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - datasets
      summary: Delete Dataset Route
      description: 'Permanently delete a dataset and its file from S3.


        The dataset must not be referenced by any evaluation runs. Invalid datasetId

        returns 400; not found returns 404; in use returns 409. Success returns 204.'
      operationId: deleteDataset
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Conflict
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Internal Server Error
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects/{projKey}/datasets/{dataset_id}/upload-url:
    post:
      tags:
      - datasets
      summary: Request New Dataset Upload Url
      operationId: requestNewDatasetUploadUrl
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetUploadInstructions'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Conflict
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Internal Server Error
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects/{projKey}/datasets/{dataset_id}/file:
    get:
      tags:
      - datasets
      summary: Download Dataset File Route
      description: 'Generate a short-lived presigned URL for downloading the raw dataset
        file

        (CSV or JSONL) from S3.'
      operationId: downloadDatasetFileRoute
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetFileDownloadResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Conflict
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Internal Server Error
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects/{projKey}/datasets/{dataset_id}/preview:
    get:
      tags:
      - datasets
      summary: Preview dataset rows
      description: Preview the dataset rows that would be selected for a given row
        selection configuration without creating an evaluation run.
      operationId: previewDatasetRows
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: mode
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/RowSelectionMode'
          description: 'Row selection mode: "all" (every row), "top" (first N rows),
            "random" (random sample).'
        description: 'Row selection mode: "all" (every row), "top" (first N rows),
          "random" (random sample).'
      - name: value
        in: query
        required: false
        schema:
          anyOf:
          - type: number
          - type: 'null'
          description: 'Selection size. Required when mode is top or random. Interpretation
            depends on unit: a fraction in (0, 1] for percent (e.g. 0.1 = 10%) or
            a positive integer for count.'
          title: Value
        description: 'Selection size. Required when mode is top or random. Interpretation
          depends on unit: a fraction in (0, 1] for percent (e.g. 0.1 = 10%) or a
          positive integer for count.'
      - name: unit
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/RowSelectionUnit'
          - type: 'null'
          description: How to interpret value. Required when mode is top or random.
          title: Unit
        description: How to interpret value. Required when mode is top or random.
      - name: seed
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Optional integer seed for deterministic random sampling.
          title: Seed
        description: Optional integer seed for deterministic random sampling.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetPreviewResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects/{projKey}/datasets/{dataset_id}/errors:
    get:
      tags:
      - datasets
      summary: List Dataset Errors
      description: 'Return dataset upload/validation errors for this dataset.


        Results are ordered by `created_at` DESC (newest first).'
      operationId: listDatasetErrors
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Dataset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatasetUploadErrorItem'
                title: Response Listdataseterrors
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Forbidden
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Not Found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
          description: Internal Server Error
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects/{projKey}/evaluations:
    get:
      tags:
      - evaluations
      summary: List evaluations
      description: Lists all evaluation definitions in a project with pagination support.
        Returns active evaluations by default, or can filter by archived state. Optional
        search matches evaluation names (case-insensitive substring). sortBy=lastRun
        orders by newest run start time (run createdAt); evaluations without runs
        sort after those with runs.
      operationId: listEvaluations
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: state
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: State
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring search on evaluation name.
          title: Search
        description: Case-insensitive substring search on evaluation name.
      - name: sortBy
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/EvaluationListSortByQuery'
          - type: 'null'
          description: 'updatedAt (default): sort by latest revision updatedAt. lastRun:
            sort by the evaluation''s most recently created run.'
          title: Sortby
        description: 'updatedAt (default): sort by latest revision updatedAt. lastRun:
          sort by the evaluation''s most recently created run.'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - evaluations
      summary: Create an AI evaluation
      description: Create a new AI evaluation and return it.
      operationId: postEvaluation
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects/{projKey}/evaluations/runs:
    get:
      tags:
      - evaluations
      summary: List evaluation runs
      description: Returns evaluation runs across all evaluations, newest-first. Supports
        offset-based pagination, optional dataset filtering, and case-insensitive
        search on evaluation name, generation provider/model, evaluation provider/model,
        dataset name, and dataset filename.
      operationId: listRuns
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: datasetId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter runs to a specific dataset by ID.
          title: Datasetid
        description: Filter runs to a specific dataset by ID.
      - name: hasDataset
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filter by dataset presence. true returns only runs with a dataset,
            false returns only runs without a dataset. Omit for all runs.
          title: Hasdataset
        description: Filter by dataset presence. true returns only runs with a dataset,
          false returns only runs without a dataset. Omit for all runs.
      - name: filter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring search on evaluation name, model
            names, dataset name, and dataset filename.
          title: Filter
        description: Case-insensitive substring search on evaluation name, model names,
          dataset name, and dataset filename.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      - name: expand
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Comma-separated list of related resources to inline. Supported:
            playground.'
          title: Expand
        description: 'Comma-separated list of related resources to inline. Supported:
          playground.'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationRunDetailListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects/{projKey}/evaluations/{evaluation_id}:
    get:
      tags:
      - evaluations
      summary: Get evaluation
      description: Retrieve a specific evaluation by ID. Omit the version query parameter
        to return the latest revision; set version to fetch a specific revision.
      operationId: getEvaluation
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: evaluation_id
        in: path
        required: true
        schema:
          type: string
          title: Evaluation Id
      - name: version
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Evaluation revision to return; omit for the latest version.
          title: Version
        description: Evaluation revision to return; omit for the latest version.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - evaluations
      summary: Update an AI evaluation
      description: Update an existing evaluation definition. All fields are optional;
        include state to archive or unarchive the evaluation.
      operationId: patchEvaluation
      parameters:
      - name: projKey
        in: path
        required: true
        schema:
          type: string
          title: Projkey
      - name: evaluation_id
        in: path
        required: true
        schema:
          type: string
          title: Evaluation Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationPatch'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorSchema'
        '403':
          description: Forbidden
